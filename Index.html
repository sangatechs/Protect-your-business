<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managed SOC & Security Services — CyberInspect</title>
<meta name="description" content="Managed SOC and security operations center services for UK businesses. Professional cybersecurity protection, 24/7 monitoring, and compliance support.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ── RESET & BASE ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --slate-950: #050A12;
  --slate-900: #080E1A;
  --slate-800: #0D1626;
  --slate-700: #152035;
  --slate-600: #1D2D47;
  --slate-500: #243759;
  --blue-bright: #3B82F6;
  --blue-mid: #2563EB;
  --blue-soft: rgba(59,130,246,0.12);
  --blue-border: rgba(59,130,246,0.2);
  --teal: #14B8A6;
  --teal-soft: rgba(20,184,166,0.1);
  --teal-border: rgba(20,184,166,0.2);
  --gold: #F59E0B;
  --white: #F0F6FF;
  --white-70: rgba(240,246,255,0.7);
  --white-40: rgba(240,246,255,0.4);
  --white-15: rgba(240,246,255,0.08);
  --border: rgba(255,255,255,0.07);
  --border-blue: rgba(59,130,246,0.18);
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 12px;
  --radius-lg: 18px;
}

body {
  font-family: var(--font-body);
  background: var(--slate-950);
  color: var(--white);
  line-height: 1.7;
  overflow-x: hidden;
}

/* mesh background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(37,99,235,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(20,184,166,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 90%, rgba(37,99,235,0.06) 0%, transparent 60%);
  pointer-events: none;
}

/* subtle grid */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 72px 72px;
  pointer-events: none;
}

a { color: inherit; text-decoration: none; }
section, header, footer, nav { position: relative; z-index: 1; }

/* ── NAV ─────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%;
  background: rgba(5,10,18,0.8);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 600;
  color: var(--white); letter-spacing: -0.01em;
}

.logo-shield {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue-mid), var(--teal));
  border-radius: 8px;
  display: grid; place-items: center;
}

.logo-shield svg { width: 17px; height: 17px; }

.nav-menu {
  display: flex; align-items: center; gap: 0;
  list-style: none;
  background: var(--white-15);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
}

.nav-menu li a {
  display: block;
  font-size: 0.8rem; font-weight: 400;
  color: var(--white-40);
  padding: 0.38rem 0.9rem;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  white-space: nowrap;
}

.nav-menu li a:hover {
  color: var(--white);
  background: rgba(255,255,255,0.06);
}

.nav-cta {
  font-size: 0.82rem; font-weight: 500;
  background: var(--blue-mid);
  color: #fff;
  padding: 0.5rem 1.2rem;
  border-radius: 7px;
  transition: background 0.2s, transform 0.15s;
}
.nav-cta:hover { background: var(--blue-bright); transform: translateY(-1px); }

@media (max-width: 760px) {
  .nav-menu { display: none; }
}

/* ── HELPERS ─────────────────────────────────────── */
.wrap { max-width: 1060px; margin: 0 auto; padding: 0 5%; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono);
  font-size: 0.68rem; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--teal);
  border: 1px solid var(--teal-border);
  background: var(--teal-soft);
  padding: 0.28rem 0.8rem; border-radius: 4px;
  margin-bottom: 1.25rem;
}

.eyebrow-blue {
  color: var(--blue-bright);
  border-color: var(--blue-border);
  background: var(--blue-soft);
}

h2 {
  font-family: var(--font-display);
  font-size: clamp(1.85rem, 3.5vw, 2.6rem);
  font-weight: 600; letter-spacing: -0.03em;
  line-height: 1.12; color: var(--white);
  margin-bottom: 1rem;
}

h2 em { font-style: italic; color: var(--blue-bright); }

.lead {
  font-size: 1rem; color: var(--white-70);
  font-weight: 300; line-height: 1.85;
  max-width: 580px;
}

.link-accent {
  color: var(--blue-bright);
  text-decoration: underline;
  text-decoration-color: rgba(59,130,246,0.35);
  text-underline-offset: 3px;
  transition: text-decoration-color 0.2s;
  font-weight: 500;
}
.link-accent:hover { text-decoration-color: var(--blue-bright); }

.divider { height: 1px; background: var(--border); }

/* ── INTRO / HERO ────────────────────────────────── */
#intro {
  padding: 6rem 0 5rem;
  border-bottom: 1px solid var(--border);
}

.intro-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 4rem;
  align-items: center;
}

@media (max-width: 820px) {
  .intro-layout { grid-template-columns: 1fr; gap: 2.5rem; }
  .intro-card { order: -1; }
}

.intro-heading {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  font-weight: 700; letter-spacing: -0.04em;
  line-height: 1.06; color: var(--white);
  margin-bottom: 1.5rem;
}

.intro-heading span { color: var(--blue-bright); }
.intro-heading em { font-style: italic; color: var(--white-70); font-weight: 300; }

.intro-text {
  font-size: 1.05rem; color: var(--white-70);
  font-weight: 300; line-height: 1.85;
  margin-bottom: 2rem;
}

.intro-url {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.78rem;
  color: var(--teal); margin-bottom: 2rem;
  opacity: 0.8;
}

.intro-url a { color: inherit; text-decoration: underline; text-decoration-color: var(--teal-border); text-underline-offset: 3px; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--blue-mid), #1D4ED8);
  color: #fff; font-size: 0.9rem; font-weight: 500;
  padding: 0.85rem 1.8rem; border-radius: 9px;
  box-shadow: 0 4px 24px rgba(37,99,235,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,99,235,0.4); }
.btn-primary svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--white-70); font-size: 0.9rem; font-weight: 400;
  padding: 0.85rem 1.5rem; border-radius: 9px;
  border: 1px solid var(--border);
  transition: border-color 0.2s, color 0.2s;
}
.btn-outline:hover { border-color: rgba(255,255,255,0.15); color: var(--white); }
.btn-outline svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.intro-btns { display: flex; gap: 0.85rem; flex-wrap: wrap; align-items: center; }

/* intro card */
.intro-card {
  background: linear-gradient(160deg, var(--slate-700), var(--slate-800));
  border: 1px solid var(--border-blue);
  border-radius: var(--radius-lg);
  padding: 1.75rem;
  position: relative; overflow: hidden;
}

.intro-card::before {
  content: '';
  position: absolute; top: -30px; right: -30px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
}

.ic-label {
  font-family: var(--font-mono); font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--white-40); margin-bottom: 1.1rem;
}

.ic-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.7rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.ic-row:last-child { border-bottom: none; padding-bottom: 0; }
.ic-key { color: var(--white-40); font-weight: 300; }
.ic-val { font-family: var(--font-mono); font-size: 0.76rem; font-weight: 500; }
.ic-val.g { color: #4ADE80; }
.ic-val.b { color: var(--blue-bright); }
.ic-val.t { color: var(--teal); }

/* ── SERVICES ────────────────────────────────────── */
#services { padding: 5rem 0; border-bottom: 1px solid var(--border); }

.services-intro {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap;
}

.svc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.svc-card {
  background: var(--slate-900);
  padding: 2rem;
  display: flex; flex-direction: column; gap: 1rem;
  transition: background 0.25s;
  position: relative;
}
.svc-card:hover { background: var(--slate-800); }

.svc-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--blue-mid), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.svc-card:hover::after { opacity: 1; }

.svc-num {
  font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500;
  color: var(--blue-bright); opacity: 0.5; letter-spacing: 0.06em;
}

.svc-icon-wrap {
  width: 44px; height: 44px;
  background: var(--blue-soft);
  border: 1px solid var(--blue-border);
  border-radius: 10px;
  display: grid; place-items: center;
}
.svc-icon-wrap.teal-ic {
  background: var(--teal-soft);
  border-color: var(--teal-border);
}
.svc-icon-wrap svg { width: 22px; height: 22px; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.svc-icon-wrap svg { stroke: var(--blue-bright); }
.svc-icon-wrap.teal-ic svg { stroke: var(--teal); }

.svc-card h3 {
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 600;
  color: var(--white); line-height: 1.25;
  letter-spacing: -0.015em;
}
.svc-card h3 a { color: inherit; transition: color 0.2s; }
.svc-card h3 a:hover { color: var(--blue-bright); }

.svc-card p {
  font-size: 0.85rem; color: var(--white-70);
  font-weight: 300; line-height: 1.75; flex: 1;
}

.svc-bullets {
  list-style: none; display: flex; flex-direction: column; gap: 0.45rem;
}
.svc-bullets li {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 0.8rem; color: var(--white-40); font-weight: 300; line-height: 1.55;
}
.svc-bullets li::before {
  content: '';
  display: block; width: 5px; height: 5px;
  border-radius: 50%; background: var(--blue-bright);
  flex-shrink: 0; margin-top: 6px; opacity: 0.6;
}

/* ── HOW IT WORKS ────────────────────────────────── */
#how { padding: 5rem 0; border-bottom: 1px solid var(--border); }

.how-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4rem; align-items: start; margin-top: 3rem;
}
@media (max-width: 760px) { .how-layout { grid-template-columns: 1fr; gap: 2.5rem; } }

.steps { display: flex; flex-direction: column; gap: 0; }

.step {
  display: flex; gap: 1.25rem;
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border);
}
.step:first-child { padding-top: 0; }
.step:last-child { border-bottom: none; padding-bottom: 0; }

.step-circle {
  width: 36px; height: 36px; flex-shrink: 0;
  border: 1px solid var(--blue-border);
  background: var(--blue-soft);
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500;
  color: var(--blue-bright);
}

.step-body h4 {
  font-size: 0.92rem; font-weight: 600;
  color: var(--white); margin-bottom: 0.35rem;
  letter-spacing: -0.01em;
}
.step-body p {
  font-size: 0.82rem; color: var(--white-40);
  font-weight: 300; line-height: 1.7;
}

/* info panel */
.info-panel {
  background: linear-gradient(160deg, var(--slate-700), var(--slate-800));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem;
  position: sticky; top: 82px;
}

.ip-title {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 600;
  color: var(--white); margin-bottom: 0.5rem;
  letter-spacing: -0.015em;
}

.ip-sub { font-size: 0.82rem; color: var(--white-40); font-weight: 300; margin-bottom: 1.5rem; }

.ip-stats { display: flex; flex-direction: column; gap: 0; }

.ip-stat {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 0; border-bottom: 1px solid var(--border);
}
.ip-stat:last-child { border-bottom: none; }

.ip-stat-label { font-size: 0.8rem; color: var(--white-40); font-weight: 300; }
.ip-stat-val {
  font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500;
  color: var(--white);
}
.ip-stat-val.hi { color: #4ADE80; }

/* ── BENEFITS ────────────────────────────────────── */
#benefits { padding: 5rem 0; border-bottom: 1px solid var(--border); }

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  margin-top: 3rem;
}
@media (max-width: 760px) { .benefits-grid { grid-template-columns: 1fr; } }
@media (min-width: 480px) and (max-width: 760px) { .benefits-grid { grid-template-columns: 1fr 1fr; } }

.benefit-card {
  background: var(--slate-800);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: border-color 0.25s, transform 0.25s;
}
.benefit-card:hover { border-color: var(--blue-border); transform: translateY(-3px); }

.bc-icon {
  width: 38px; height: 38px;
  background: var(--teal-soft); border: 1px solid var(--teal-border);
  border-radius: 8px; display: grid; place-items: center; margin-bottom: 1rem;
}
.bc-icon svg { width: 19px; height: 19px; stroke: var(--teal); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.benefit-card h3 {
  font-size: 0.9rem; font-weight: 600;
  color: var(--white); margin-bottom: 0.65rem;
  letter-spacing: -0.01em;
}

.benefit-card ul { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
.benefit-card ul li {
  font-size: 0.79rem; color: var(--white-40);
  font-weight: 300; line-height: 1.55;
  padding-left: 1rem; position: relative;
}
.benefit-card ul li::before {
  content: '→';
  position: absolute; left: 0;
  font-size: 0.72rem; color: var(--teal); opacity: 0.6;
}

/* ── CTA ─────────────────────────────────────────── */
#cta { padding: 5rem 0; }

.cta-box {
  background: linear-gradient(135deg, var(--slate-700) 0%, var(--slate-800) 100%);
  border: 1px solid var(--border-blue);
  border-radius: 20px;
  padding: 4rem;
  text-align: center;
  position: relative; overflow: hidden;
}

.cta-box::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,99,235,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 120%, rgba(20,184,166,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.cta-box > * { position: relative; z-index: 1; }

.cta-box h2 {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700; letter-spacing: -0.035em;
  color: var(--white); margin-bottom: 1rem;
}

.cta-box p {
  font-size: 1rem; color: var(--white-70);
  font-weight: 300; max-width: 480px;
  margin: 0 auto 2.5rem; line-height: 1.85;
}

.cta-btns {
  display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
}

.btn-cta-main {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--blue-mid); color: #fff;
  font-size: 0.92rem; font-weight: 500;
  padding: 0.95rem 2rem; border-radius: 10px;
  box-shadow: 0 6px 28px rgba(37,99,235,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-cta-main:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(37,99,235,0.45); }
.btn-cta-main svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.btn-cta-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--white-70); font-size: 0.92rem; font-weight: 400;
  padding: 0.95rem 1.75rem; border-radius: 10px;
  border: 1px solid var(--border);
  transition: color 0.2s, border-color 0.2s;
}
.btn-cta-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.15); }
.btn-cta-ghost svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── CONTACT ─────────────────────────────────────── */
#contact {
  padding: 4rem 0 5rem;
  border-top: 1px solid var(--border);
}

.contact-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4rem; align-items: start; margin-top: 2.5rem;
}
@media (max-width: 640px) { .contact-layout { grid-template-columns: 1fr; gap: 2rem; } }

.contact-info { display: flex; flex-direction: column; gap: 1.5rem; }

.ci-item {
  display: flex; align-items: flex-start; gap: 12px;
}

.ci-icon {
  width: 34px; height: 34px; flex-shrink: 0;
  background: var(--blue-soft); border: 1px solid var(--blue-border);
  border-radius: 8px; display: grid; place-items: center;
}
.ci-icon svg { width: 16px; height: 16px; stroke: var(--blue-bright); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.ci-label {
  font-family: var(--font-mono); font-size: 0.62rem; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--white-40); margin-bottom: 2px;
}
.ci-val {
  font-size: 0.88rem; color: var(--white);
  line-height: 1.6; font-weight: 400;
}
a.ci-val { transition: color 0.2s; }
a.ci-val:hover { color: var(--blue-bright); }

.contact-form-area {
  background: var(--slate-800);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2rem;
}

.cf-heading {
  font-family: var(--font-display);
  font-size: 1.15rem; font-weight: 600;
  color: var(--white); margin-bottom: 0.4rem;
  letter-spacing: -0.015em;
}
.cf-sub { font-size: 0.82rem; color: var(--white-40); font-weight: 300; margin-bottom: 1.5rem; }

.cf-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.83rem;
}
.cf-item:last-child { border-bottom: none; }
.cf-item-label { color: var(--white-40); font-weight: 300; }
.cf-item-val { font-weight: 500; color: var(--white); }
.cf-item-val.accent { color: #4ADE80; }

/* ── FOOTER ─────────────────────────────────────── */
footer {
  background: var(--slate-900);
  border-top: 1px solid var(--border);
  padding: 1.5rem 5%;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
  position: relative; z-index: 1;
}

footer p {
  font-size: 0.78rem; color: var(--white-40);
  font-weight: 300;
}

footer a {
  font-family: var(--font-mono); font-size: 0.75rem;
  color: var(--blue-bright); opacity: 0.7;
  transition: opacity 0.2s;
}
footer a:hover { opacity: 1; }
